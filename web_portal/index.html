<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Device Protection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #841EA0, #6A1B8A);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 380px;
            text-align: center;
        }

        .login-container h1 {
            color: #841EA0;
            font-size: 28px;
        }

        .login-container p {
            color: #666;
            margin: 10px 0 25px 0;
        }

        .login-container input {
            width: 100%;
            padding: 14px;
            margin-bottom: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        .login-container input:focus {
            outline: none;
            border-color: #841EA0;
        }

        .login-container button {
            width: 100%;
            padding: 14px;
            background: #841EA0;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .login-container button:hover {
            background: #6A1B8A;
        }

        .error {
            color: red;
            margin-top: 12px;
            font-size: 14px;
        }

        .footer {
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>🔒 Device Protection</h1>
        <p>Admin Portal Login</p>

        <input type="email" id="email" placeholder="Admin Email" />
        <input type="password" id="password" placeholder="Password" />
        <button id="loginBtn">Login</button>

        <div id="error" class="error"></div>
        <div class="footer">© 2026 Device Protection</div>
    </div>

    <script>
        // Firebase config (YOU NEED TO ADD YOUR CONFIG)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const error = document.getElementById('error');

            if (!email || !password) {
                error.textContent = 'Please fill all fields.';
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    window.location.href = 'dashboard.html';
                })
                .catch((err) => {
                    error.textContent = err.message;
                });
        });
    </script>

</body>
</html>
